<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quản lý lớp học</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f2f2f2;
margin-top:100px;
}

button{
width:200px;
height:80px;
font-size:20px;
margin:20px;
border:none;
border-radius:10px;
background:#4CAF50;
color:white;
cursor:pointer;
}

button:hover{
background:#45a049;
}

</style>

</head>

<body>

<h1>Hệ thống quản lý lớp</h1>

<button onclick="diemdanh()">📷 Điểm danh</button>

<button onclick="danhsach()">📋 Danh sách lớp</button>

<script>

function diemdanh(){
alert("Trang điểm danh sẽ làm sau");
}

function danhsach(){
alert("Trang danh sách lớp sẽ làm sau");
}

</script>

</body>
</html>
