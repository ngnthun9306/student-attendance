<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quản lý học sinh</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<h2>Nhập học sinh</h2>

<input id="id" placeholder="ID">
<input id="name" placeholder="Tên">
<button onclick="createQR()">Tạo QR</button>

<div id="qrcode"></div>

<hr>

<h2>Quét QR điểm danh</h2>

<div id="reader" style="width:300px"></div>

<hr>

<h2>Nhập điểm</h2>

<input id="sid" placeholder="ID">
<input id="sname" placeholder="Tên">
<input id="score" placeholder="Điểm">

<button onclick="saveScore()">Lưu điểm</button>

<script>

var url="WEB_APP_URL";

function createQR(){

var id=document.getElementById("id").value;

document.getElementById("qrcode").innerHTML="";

new QRCode(document.getElementById("qrcode"),id);

}

function onScanSuccess(decodedText){

fetch(url,{
method:"POST",
body:JSON.stringify({
type:"attendance",
id:decodedText,
name:""
})
})

alert("Điểm danh thành công: "+decodedText);

}

var scanner=new Html5QrcodeScanner("reader",{fps:10,qrbox:250});
scanner.render(onScanSuccess);

function saveScore(){

var id=document.getElementById("sid").value;
var name=document.getElementById("sname").value;
var score=document.getElementById("score").value;

fetch(url,{
method:"POST",
body:JSON.stringify({
type:"score",
id:id,
name:name,
score:score
})
})

alert("Đã lưu điểm");

}

</script>

</body>
</html>
